{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container" style="padding: 20px;">
    <div style="margin-bottom: 20px;">
        <a href="{% url 'library_list' %}" class="btn btn-secondary">&larr; Back to Library</a>
    </div>

    <div class="card">
        <div class="card-header">
            <h3>{{ material.title }}</h3>
            <span class="badge bg-info">{{ material.get_category_display }}</span>
        </div>
        <div class="card-body">
            <div class="embed-responsive" style="height: 800px; border: 1px solid #ddd; background: #f9f9f9;">
                <iframe src="{{ material.file.url }}" width="100%" height="100%" style="border:none;">
                    <p>Your browser does not support embedding this file type. 
                    <a href="{{ material.file.url }}">Click here to download it.</a></p>
                </iframe>
            </div>
        </div>
    </div>
</div>
{% endblock %}
