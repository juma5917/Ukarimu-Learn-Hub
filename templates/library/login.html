{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container">
    <div class="row justify-content-center" style="margin-top: 60px;">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <!-- Ensure you have a logo.png in your static/images folder -->
                        <img src="{% static 'images/logo.png' %}" alt="Ukarimu Logo" style="max-height: 100px; margin-bottom: 15px;">
                        <h4>Login</h4>
                    </div>
                    
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <div class="d-grid mt-3">
                            <button type="submit" class="btn btn-primary btn-block">Sign In</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
