{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm">
            <div class="card-header bg-white border-bottom-0 pt-4 px-4">
                <h4>{{ title }}</h4>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">{{ field.label }}</label>
                        {{ field }}
                        {% if field.help_text %}<div class="form-text small">{{ field.help_text }}</div>{% endif %}
                        {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
                    </div>
                    {% endfor %}
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary">Save User</button>
                        <a href="{% url 'admin_dashboard' %}" class="btn btn-light">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script>document.querySelectorAll('input, select').forEach(input => { input.classList.add('form-control'); if(input.type === "checkbox"){input.classList.remove('form-control'); input.classList.add('form-check-input');} });</script>
{% endblock %}
